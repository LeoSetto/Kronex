<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#080C12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kronex</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23080C12'/%3E%3Ccircle cx='32' cy='32' r='22' stroke='%2322D3EE' stroke-width='2' opacity='0.3'/%3E%3Ccircle cx='32' cy='32' r='14' stroke='%2322D3EE' stroke-width='1.5' opacity='0.5'/%3E%3Ccircle cx='32' cy='32' r='3' fill='%2322D3EE'/%3E%3Cpath d='M32 10L34.5 28H29.5L32 10Z' fill='%2322D3EE'/%3E%3Cpath d='M32 54L29.5 36H34.5L32 54Z' fill='%230E7490' opacity='0.6'/%3E%3Cpath d='M10 32L28 29.5V34.5L10 32Z' fill='%230E7490' opacity='0.6'/%3E%3Cpath d='M54 32L36 34.5V29.5L54 32Z' fill='%2322D3EE'/%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23080C12'/%3E%3Ccircle cx='32' cy='32' r='22' stroke='%2322D3EE' stroke-width='2' opacity='0.3'/%3E%3Ccircle cx='32' cy='32' r='14' stroke='%2322D3EE' stroke-width='1.5' opacity='0.5'/%3E%3Ccircle cx='32' cy='32' r='3' fill='%2322D3EE'/%3E%3Cpath d='M32 10L34.5 28H29.5L32 10Z' fill='%2322D3EE'/%3E%3Cpath d='M32 54L29.5 36H34.5L32 54Z' fill='%230E7490' opacity='0.6'/%3E%3Cpath d='M10 32L28 29.5V34.5L10 32Z' fill='%230E7490' opacity='0.6'/%3E%3Cpath d='M54 32L36 34.5V29.5L54 32Z' fill='%2322D3EE'/%3E%3C/svg%3E" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080C12;
      height: 100vh;
      width: 100vw;
    }

    body.splash-active {
      overflow: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080C12;
      transition: opacity .4s ease, transform .4s ease;
    }

    #splash.hide {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .splash-logo {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }

    .splash-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid rgba(34, 211, 238, 0.15);
      animation: ringPulse 2s ease-in-out infinite;
    }

    .splash-ring::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(34, 211, 238, 0.08);
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.6; }
    }

    .splash-glow {
      position: absolute;
      width: 200px;
      height: 200px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(34, 211, 238, 0.12) 0%, transparent 70%);
      animation: glowPulse 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    .splash-logo svg {
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 4px 24px rgba(34, 211, 238, 0.4));
    }

    .compass-outer {
      animation: compassIn .6s cubic-bezier(.4,0,.2,1) both;
    }

    .compass-needle {
      animation: compassIn .6s cubic-bezier(.4,0,.2,1) .15s both;
      transform-origin: 32px 32px;
    }

    .compass-spin {
      animation: needleSpin 1s cubic-bezier(.4,0,.2,1) .3s both;
      transform-origin: 32px 32px;
    }

    @keyframes compassIn {
      0% { opacity: 0; transform: scale(0.5); }
      60% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes needleSpin {
      0% { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }

    .splash-name {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 38px;
      font-weight: 900;
      background: linear-gradient(135deg, #22D3EE, #0EA5E9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0;
      animation: textUp .5s cubic-bezier(.4,0,.2,1) .4s both;
    }

    .splash-sub {
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 12px;
      color: rgba(34, 211, 238, 0.4);
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-top: 8px;
      opacity: 0;
      animation: textUp .5s cubic-bezier(.4,0,.2,1) .55s both;
    }

    @keyframes textUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .splash-dots {
      display: flex;
      gap: 6px;
      margin-top: 40px;
      opacity: 0;
      animation: textUp .4s ease .7s both;
    }

    .splash-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22D3EE;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .splash-dots span:nth-child(2) { animation-delay: .15s; }
    .splash-dots span:nth-child(3) { animation-delay: .3s; }

    @keyframes dotBounce {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&family=Outfit:wght@400;600;700;800;900&display=swap');

    #root {
      opacity: 0;
      transition: opacity .3s ease;
    }

    #root.ready {
      opacity: 1;
    }

    #root:not(.ready) {
      visibility: hidden;
      height: 0;
      overflow: hidden;
    }
  </style>
</head>
<body class="splash-active">
  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-glow"></div>
    <div class="splash-logo">
      <div class="splash-ring"></div>
      <svg width="120" height="120" viewBox="0 0 64 64" fill="none">
        <circle class="compass-outer" cx="32" cy="32" r="28" stroke="#22D3EE" stroke-width="1.5" opacity="0.25"/>
        <circle class="compass-outer" cx="32" cy="32" r="20" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>
        <g class="compass-spin">
          <circle cx="32" cy="32" r="3.5" fill="#22D3EE"/>
          <path d="M32 8L35 28H29L32 8Z" fill="#22D3EE"/>
          <path d="M32 56L29 36H35L32 56Z" fill="#0E7490" opacity="0.6"/>
          <path d="M8 32L28 29V35L8 32Z" fill="#0E7490" opacity="0.6"/>
          <path d="M56 32L36 35V29L56 32Z" fill="#22D3EE"/>
        </g>
        <!-- Tick marks -->
        <line x1="32" y1="5" x2="32" y2="9" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
        <line x1="32" y1="55" x2="32" y2="59" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
        <line x1="5" y1="32" x2="9" y2="32" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
        <line x1="55" y1="32" x2="59" y2="32" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
      </svg>
    </div>
    <div class="splash-name">Kronex</div>
    <div class="splash-sub">career mode tracker</div>
    <div class="splash-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <!-- App -->
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    function hideSplash() {
      var splash = document.getElementById('splash');
      var root = document.getElementById('root');
      document.body.classList.remove('splash-active');
      if (root) root.classList.add('ready');
      if (splash) splash.classList.add('hide');
      setTimeout(function() { if (splash) splash.remove(); }, 500);
    }

    function isAppReady() {
      var root = document.getElementById('root');
      if (!root || !root.children.length) return false;
      var app = root.querySelector('.app');
      if (app) return true;
      var form = root.querySelector('form, input[type="email"], button');
      if (form) return true;
      return false;
    }

    var observer = new MutationObserver(function(mutations, obs) {
      if (isAppReady()) {
        setTimeout(hideSplash, 100);
        obs.disconnect();
      }
    });

    observer.observe(document.getElementById('root'), { childList: true, subtree: true });

    // Fallback
    setTimeout(hideSplash, 5000);
  </script>
</body>
</html>
