  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080C12; height: 100vh; width: 100vw; }
    body.splash-active { overflow: hidden; }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #080C12; transition: opacity .4s ease, transform .4s ease;
    }
    #splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

    .splash-logo {
      position: relative; width: 130px; height: 130px; margin-bottom: 28px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Glow ring behind logo */
    .splash-ring {
      position: absolute; inset: -12px; border-radius: 50%;
      border: 1.5px solid rgba(34, 211, 238, 0.12);
      animation: ringPulse 2.5s ease-in-out infinite;
    }
    .splash-ring::after {
      content: ''; position: absolute; inset: -8px; border-radius: 50%;
      border: 1px solid rgba(34, 211, 238, 0.06);
    }
    @keyframes ringPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.06);opacity:.5} }

    /* Ambient glow */
    .splash-glow {
      position: absolute; width: 220px; height: 220px; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: radial-gradient(circle, rgba(34,211,238,0.08) 0%, rgba(167,139,250,0.04) 40%, transparent 70%);
      animation: glowPulse 3s ease-in-out infinite; pointer-events: none;
    }
    @keyframes glowPulse { 0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.12)} }

    /* Logo image animation */
    .splash-logo img {
      width: 120px; height: 120px; object-fit: contain;
      position: relative; z-index: 2;
      filter: drop-shadow(0 0 20px rgba(34,211,238,0.25)) drop-shadow(0 0 40px rgba(167,139,250,0.15));
      animation: logoEnter .7s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes logoEnter {
      0% { opacity: 0; transform: scale(0.6) rotate(-10deg); filter: drop-shadow(0 0 0 transparent); }
      50% { opacity: 1; transform: scale(1.05) rotate(2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 20px rgba(34,211,238,0.25)) drop-shadow(0 0 40px rgba(167,139,250,0.15)); }
    }

    /* Subtle continuous shimmer on logo */
    .splash-logo::before {
      content: ''; position: absolute; inset: 0; z-index: 3;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
      animation: shimmer 3s ease-in-out infinite;
      border-radius: 50%; pointer-events: none;
    }
    @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

    .splash-name {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-size: 36px; font-weight: 900;
      color: #fff; letter-spacing: 3px; text-transform: uppercase;
      opacity: 0; animation: textUp .5s cubic-bezier(.4,0,.2,1) .5s both;
    }
    .splash-sub {
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 11px; color: rgba(255,255,255,0.25);
      text-transform: uppercase; letter-spacing: 5px; margin-top: 8px;
      opacity: 0; animation: textUp .5s cubic-bezier(.4,0,.2,1) .65s both;
    }
    @keyframes textUp { 0%{opacity:0;transform:translateY(12px)} 100%{opacity:1;transform:translateY(0)} }

    .splash-dots { display:flex; gap:6px; margin-top:36px; opacity:0; animation:textUp .4s ease .8s both; }
    .splash-dots span { width:5px; height:5px; border-radius:50%; background:#fff; animation:dotBounce 1.2s ease-in-out infinite; }
    .splash-dots span:nth-child(2){animation-delay:.15s}
    .splash-dots span:nth-child(3){animation-delay:.3s}
    @keyframes dotBounce { 0%,80%,100%{opacity:.15;transform:scale(.8)} 40%{opacity:.8;transform:scale(1.2)} }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&family=Outfit:wght@400;600;700;800;900&display=swap');

    #root { opacity: 0; transition: opacity .3s ease; }
    #root.ready { opacity: 1; }
    #root:not(.ready) { visibility: hidden; height: 0; overflow: hidden; }
  </style>
</head>
<body class="splash-active">
  <div id="splash">
    <div class="splash-glow"></div>
    <div class="splash-logo">
      <div class="splash-ring"></div>
      <img src="/logo-200.png" alt="Kronex" />
    </div>
    <div class="splash-name">Kronex</div>
    <div class="splash-sub">career mode tracker</div>
    <div class="splash-dots"><span></span><span></span><span></span></div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    function hideSplash(){var s=document.getElementById('splash'),r=document.getElementById('root');document.body.classList.remove('splash-active');if(r)r.classList.add('ready');if(s)s.classList.add('hide');setTimeout(function(){if(s)s.remove();},500);}
    function isAppReady(){var r=document.getElementById('root');if(!r||!r.children.length)return false;if(r.querySelector('.app'))return true;if(r.querySelector('input[type="email"],button'))return true;return false;}
    var observer=new MutationObserver(function(m,o){if(isAppReady()){setTimeout(hideSplash,100);o.disconnect();}});
    observer.observe(document.getElementById('root'),{childList:true,subtree:true});
    setTimeout(hideSplash,5000);
  </script>
</body>
