  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#080C12;height:100vh;width:100vw}
    body.splash-active{overflow:hidden}
    #splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080C12;transition:opacity .4s ease,transform .4s ease}
    #splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
    .splash-logo{position:relative;width:130px;height:130px;margin-bottom:28px;display:flex;align-items:center;justify-content:center}
    .splash-ring{position:absolute;inset:-12px;border-radius:50%;border:1.5px solid rgba(34,211,238,.08);animation:ringPulse 2.5s ease-in-out infinite}
    @keyframes ringPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.4}}
    .splash-glow{position:absolute;width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(34,211,238,.05) 0%,transparent 70%);animation:glowPulse 3s ease-in-out infinite;pointer-events:none}
    @keyframes glowPulse{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
    .splash-logo img{width:110px;height:110px;object-fit:contain;position:relative;z-index:2;animation:logoEnter .7s cubic-bezier(.4,0,.2,1) both}
    @keyframes logoEnter{0%{opacity:0;transform:scale(.7)}50%{opacity:1;transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
    .splash-name{font-family:'Outfit',-apple-system,sans-serif;font-size:36px;font-weight:900;color:#fff;letter-spacing:3px;text-transform:uppercase;opacity:0;animation:textUp .5s cubic-bezier(.4,0,.2,1) .5s both}
    .splash-sub{font-family:'DM Sans',-apple-system,sans-serif;font-size:11px;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:5px;margin-top:8px;opacity:0;animation:textUp .5s cubic-bezier(.4,0,.2,1) .65s both}
    @keyframes textUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
    .splash-dots{display:flex;gap:6px;margin-top:36px;opacity:0;animation:textUp .4s ease .8s both}
    .splash-dots span{width:5px;height:5px;border-radius:50%;background:#fff;animation:dotBounce 1.2s ease-in-out infinite}
    .splash-dots span:nth-child(2){animation-delay:.15s}
    .splash-dots span:nth-child(3){animation-delay:.3s}
    @keyframes dotBounce{0%,80%,100%{opacity:.15;transform:scale(.8)}40%{opacity:.7;transform:scale(1.2)}}
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&family=Outfit:wght@400;600;700;800;900&display=swap');
    #root{opacity:0;transition:opacity .3s ease}
    #root.ready{opacity:1}
    #root:not(.ready){visibility:hidden;height:0;overflow:hidden}
  </style>
</head>
<body class="splash-active">
  <div id="splash">
    <div class="splash-glow"></div>
