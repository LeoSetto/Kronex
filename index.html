<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#080C12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kronex</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23080C12'/%3E%3Ccircle cx='32' cy='32' r='24' stroke='%23ffffff' stroke-width='2' opacity='0.2'/%3E%3Cpath d='M37 6L25 30H31L23 58L45 26H35L37 6Z' fill='%23ffffff' opacity='0.9'/%3E%3Cpath d='M27 27L29 23L31 27L29 31Z' fill='%23ffffff'/%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23080C12'/%3E%3Ccircle cx='32' cy='32' r='24' stroke='%23ffffff' stroke-width='2' opacity='0.2'/%3E%3Cpath d='M37 6L25 30H31L23 58L45 26H35L37 6Z' fill='%23ffffff' opacity='0.9'/%3E%3Cpath d='M27 27L29 23L31 27L29 31Z' fill='%23ffffff'/%3E%3C/svg%3E" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080C12; height: 100vh; width: 100vw; }
    body.splash-active { overflow: hidden; }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #080C12; transition: opacity .4s ease, transform .4s ease;
    }
    #splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

    .splash-logo { position: relative; width: 120px; height: 120px; margin-bottom: 32px; }

    .splash-ring {
      position: absolute; inset: -10px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
      animation: ringPulse 2s ease-in-out infinite;
    }
    .splash-ring::after {
      content: ''; position: absolute; inset: -6px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.05);
    }
    @keyframes ringPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.6} }

    .splash-glow {
      position: absolute; width: 200px; height: 200px; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: radial-gradient(circle, rgba(34,211,238,0.1) 0%, transparent 70%);
      animation: glowPulse 2.5s ease-in-out infinite; pointer-events: none;
    }
    @keyframes glowPulse { 0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)} }

    .splash-logo svg { position: relative; z-index: 2; filter: drop-shadow(0 4px 24px rgba(255,255,255,0.15)); }

    .logo-ball { animation: logoIn .6s cubic-bezier(.4,0,.2,1) both; }
    .logo-bolt { animation: boltIn .5s cubic-bezier(.4,0,.2,1) .2s both; }
    .logo-star { animation: starIn .4s cubic-bezier(.4,0,.2,1) .4s both; }

    @keyframes logoIn { 0%{opacity:0;transform:scale(.5)} 60%{opacity:1;transform:scale(1.05)} 100%{opacity:1;transform:scale(1)} }
    @keyframes boltIn { 0%{opacity:0;transform:translateY(-20px)} 60%{opacity:1;transform:translateY(3px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes starIn { 0%{opacity:0;transform:scale(0)} 100%{opacity:1;transform:scale(1)} }

    .splash-name {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-size: 38px; font-weight: 900;
      color: #fff; letter-spacing: 2px; text-transform: uppercase;
      opacity: 0; animation: textUp .5s cubic-bezier(.4,0,.2,1) .4s both;
    }
    .splash-sub {
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 12px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 5px; margin-top: 8px;
      opacity: 0; animation: textUp .5s cubic-bezier(.4,0,.2,1) .55s both;
    }
    @keyframes textUp { 0%{opacity:0;transform:translateY(12px)} 100%{opacity:1;transform:translateY(0)} }

    .splash-dots { display:flex; gap:6px; margin-top:40px; opacity:0; animation:textUp .4s ease .7s both; }
    .splash-dots span { width:6px; height:6px; border-radius:50%; background:#fff; animation:dotBounce 1.2s ease-in-out infinite; }
    .splash-dots span:nth-child(2){animation-delay:.15s}
    .splash-dots span:nth-child(3){animation-delay:.3s}
    @keyframes dotBounce { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1.2)} }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&family=Outfit:wght@400;600;700;800;900&display=swap');

    #root { opacity: 0; transition: opacity .3s ease; }
    #root.ready { opacity: 1; }
    #root:not(.ready) { visibility: hidden; height: 0; overflow: hidden; }
  </style>
</head>
<body class="splash-active">
  <div id="splash">
    <div class="splash-glow"></div>
    <div class="splash-logo">
      <div class="splash-ring"></div>
      <svg width="120" height="120" viewBox="0 0 64 64" fill="none">
        <!-- Ball circle -->
        <circle class="logo-ball" cx="32" cy="32" r="27" stroke="#fff" stroke-width="2" opacity="0.25"/>
        <!-- Ball subtle lines -->
        <path class="logo-ball" d="M18 20C24 22 28 26 30 32" stroke="#fff" stroke-width="0.8" opacity="0.08"/>
        <path class="logo-ball" d="M46 20C40 22 36 26 34 32" stroke="#fff" stroke-width="0.8" opacity="0.08"/>
        <path class="logo-ball" d="M22 46C26 40 30 36 32 34" stroke="#fff" stroke-width="0.8" opacity="0.08"/>
        <path class="logo-ball" d="M42 46C38 40 34 36 32 34" stroke="#fff" stroke-width="0.8" opacity="0.08"/>
        <!-- Lightning bolt -->
        <path class="logo-bolt" d="M38 4L24 30H32L22 60L46 26H36L38 4Z" fill="#fff" opacity="0.9"/>
        <!-- Star -->
        <path class="logo-star" d="M26 28L28 24L30 28L28 32Z" fill="#fff"/>
      </svg>
    </div>
    <div class="splash-name">Kronex</div>
    <div class="splash-sub">career mode tracker</div>
    <div class="splash-dots"><span></span><span></span><span></span></div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    function hideSplash(){var s=document.getElementById('splash'),r=document.getElementById('root');document.body.classList.remove('splash-active');if(r)r.classList.add('ready');if(s)s.classList.add('hide');setTimeout(function(){if(s)s.remove();},500);}
    function isAppReady(){var r=document.getElementById('root');if(!r||!r.children.length)return false;if(r.querySelector('.app'))return true;if(r.querySelector('input[type="email"],button'))return true;return false;}
    var observer=new MutationObserver(function(m,o){if(isAppReady()){setTimeout(hideSplash,100);o.disconnect();}});
    observer.observe(document.getElementById('root'),{childList:true,subtree:true});
    setTimeout(hideSplash,5000);
  </script>
</body>
</html>
